<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiten Banner v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #e5e5e5;
            font-family: 'Inter', sans-serif;
            padding: 40px 20px;
        }

        .banner {
            width: 100%;
            max-width: 1280px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1a1a 100%);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            padding: 60px 70px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.35);
        }

        .banner::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -5%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 107, 107, 0.2) 0%, transparent 60%);
            animation: glow 5s ease-in-out infinite;
        }

        .banner::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #FF6B6B 0%, transparent 70%);
        }

        @keyframes glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }

        .content {
            position: relative;
            z-index: 2;
        }

        .main-text {
            font-size: 76px;
            font-weight: 700;
            color: #FF9B9B;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
            animation: fadeInUp 0.6s ease-out;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .heart-emoji {
            font-size: 64px;
            animation: heartbeat 2s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            10%, 30% { transform: scale(1.15); }
            20%, 40% { transform: scale(1); }
        }

        .subtitle {
            font-size: 24px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: fadeInUp 0.8s ease-out;
        }

        .subtitle::before {
            content: '';
            width: 40px;
            height: 2px;
            background: rgba(255, 255, 255, 0.5);
        }

        .cta-text {
            font-size: 32px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 20px;
            animation: fadeInUp 1s ease-out;
        }

        .tagline {
            font-size: 26px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            animation: fadeInUp 1.2s ease-out;
        }

        .tagline-highlight {
            color: #ffffff;
            font-weight: 600;
        }

        .bottom-section {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 20px;
            margin-top: 60px;
            animation: fadeIn 1.4s ease-out;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 24px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .logo-img {
            height: 40px;
            width: auto;
        }

        .url {
            font-size: 20px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.6);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 1024px) {
            .banner {
                padding: 50px 50px;
            }

            .main-text {
                font-size: 60px;
            }

            .subtitle {
                font-size: 20px;
            }

            .cta-text {
                font-size: 28px;
            }

            .tagline {
                font-size: 22px;
            }
        }

        @media (max-width: 768px) {
            .banner {
                padding: 40px 35px;
            }

            .main-text {
                font-size: 48px;
            }

            .subtitle {
                font-size: 18px;
                margin-bottom: 35px;
            }

            .cta-text {
                font-size: 24px;
            }

            .tagline {
                font-size: 20px;
            }

            .bottom-section {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .logo-text {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="content">
            <div class="main-text">50+ месяцев<span class="heart-emoji">❤️</span></div>
            <div class="subtitle">столько в среднем с нами работают клиенты</div>
            
            <div class="cta-text">Станьте партнёром и зарабатывайте годами.</div>
            <div class="tagline"><span class="tagline-highlight">Kaiten</span> — продукт, который любят, а не терпят.</div>
        </div>

        <div class="bottom-section">
            <div class="logo-container">
               <img src="https://kaiten.ru/assets/img/logo.svg" alt="Kaiten" class="logo-img">
            </div>
            <div class="url">kaiten.ru/partners</div>
        </div>
    </div>
</body>
</html>
